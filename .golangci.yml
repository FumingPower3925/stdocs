version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - decorder
    - durationcheck
    - errcheck
    - errorlint
    - copyloopvar
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - gocognit
    - gocritic
    - gocyclo
    - godot
    - gosec
    - gosmopolitan
    - govet
    - ineffassign
    - misspell
    - musttag
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace

  settings:
    gocognit:
      min-complexity: 40
    gocyclo:
      min-complexity: 25
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - inline
    revive:
      rules:
        - name: var-naming
          arguments:
            - ["ID"] # allow common Go short forms
        - name: package-comments
        - name: dot-imports
        - name: error-return

  exclusions:
    # cmd/demo is a demo binary, not library code: skip it entirely.
    # ("all" is not a valid linter name in exclusion rules; paths is
    # the documented way to exclude a directory from every linter.)
    paths:
      - cmd/demo/
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocognit
          - gocyclo
          - forcetypeassert
          - noctx
          - usestdlibvars
      - path: internal/spec/yaml/
        linters:
          - gocognit

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
