name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: Build
        run: go build ./...
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:" && echo "$out" && exit 1
          fi
      - name: Test (with race)
        run: go test -race -count=1 -timeout 120s ./...
      - name: Fuzz (short)
        run: go test -fuzz=^FuzzParsePattern$ -fuzztime=10s ./internal/pattern/
      - name: Vet
        run: go vet ./...

  # stdocs follows the Go project's release support policy: the two
  # most recent Go releases. The supported floor is the go directive
  # in go.mod; this job computes every stable patch release >= that
  # floor from go.dev and fans the full suite out over all of them,
  # so every version we advertise compatibility with is actually
  # tested — including patches released after this file was written.
  versions:
    name: Supported Go versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        name: Compute versions from the go.mod floor
        run: |
          floor="$(awk '/^go /{print $2}' go.mod)"
          curl -fsSL 'https://go.dev/dl/?mode=json&include=all' -o releases.json
          python3 - "$floor" <<'EOF' > versions.json
          import json, sys

          floor = tuple(int(x) for x in sys.argv[1].split("."))
          out = []
          for rel in json.load(open("releases.json")):
              if not rel.get("stable"):
                  continue
              v = rel["version"].removeprefix("go")
              parts = v.split(".")
              if len(parts) == 2:
                  parts.append("0")
              try:
                  t = tuple(int(x) for x in parts)
              except ValueError:
                  continue
              if t >= floor:
                  out.append((t, v))
          out.sort()
          print(json.dumps([v for _, v in out]))
          EOF
          echo "Supported versions: $(cat versions.json)"
          echo "matrix=$(cat versions.json)" >> "$GITHUB_OUTPUT"

  compat:
    name: Go ${{ matrix.go }}
    needs: versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.versions.outputs.matrix) }}
    env:
      # Force the exact toolchain under test; if go.mod ever demands
      # a newer one, this fails loudly instead of silently upgrading.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Toolchain
        run: go version
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (with race)
        run: go test -race -count=1 -timeout 120s ./...
      - name: YAML roundtrip module
        working-directory: internal/spec/yaml/roundtrip_test
        run: |
          go vet ./...
          go test -race -count=1 -timeout 60s ./...

  # Single fan-in check for branch protection: required status checks
  # are matched by name, and the compat matrix's job names change with
  # every Go patch release — so protection requires only this job,
  # which fails unless every job it needs succeeded.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [test, versions, compat, lint, coverage]
    if: always()
    steps:
      - name: All required jobs succeeded
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "a required job finished with: $r" && exit 1
            fi
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: Generate coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
