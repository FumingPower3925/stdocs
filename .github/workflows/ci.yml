name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:" && echo "$out" && exit 1
          fi
      - name: Test (with race)
        run: go test -race -count=1 -timeout 120s ./...
      - name: Fuzz (short)
        run: go test -fuzz=^FuzzParsePattern$ -fuzztime=10s ./internal/pattern/
      - name: Vet
        run: go vet ./...

  roundtrip:
    # The YAML round-trip test lives in its own go module under
    # internal/spec/yaml/roundtrip_test/ so that gopkg.in/yaml.v3
    # does not appear in the main module's dep graph. Run it
    # separately to verify the hand-rolled YAML emitter parses
    # with a real YAML parser.
    name: YAML Roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run roundtrip tests
        working-directory: internal/spec/yaml/roundtrip_test
        run: |
          go vet ./...
          go test -race -count=1 -timeout 60s ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
