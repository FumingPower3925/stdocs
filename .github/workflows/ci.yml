name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Build
        run: go build ./...
      - name: Test (with race)
        run: go test -race -count=1 -timeout 60s ./...
      - name: Fuzz (short)
        run: go test -fuzz=^FuzzParsePattern$ -fuzztime=10s ./internal/pattern/
      - name: Vet
        run: go vet ./...

  roundtrip:
    # The YAML round-trip test lives in its own go module under
    # internal/spec/yaml/roundtrip_test/ so that gopkg.in/yaml.v3
    # does not appear in the main module's dep graph. Run it
    # separately to verify the hand-rolled YAML emitter parses
    # with a real YAML parser.
    name: YAML Roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Run roundtrip tests
        working-directory: internal/spec/yaml/roundtrip_test
        run: go test -count=1 -timeout 30s ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Generate coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./... > coverage.txt
          cat coverage.txt
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
