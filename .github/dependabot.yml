# Dependabot configuration.
#
# All update checks run weekly. All PRs are grouped into a single
# PR per push so the queue stays at one entry.
#
# Ecosystems covered:
#   - gomod: weekly Go module updates for the root module (currently
#     zero-dependency) and the nested YAML round-trip test module
#     (which depends on gopkg.in/yaml.v3). Dependabot does not bump
#     the Go toolchain itself.
#   - github-actions: weekly updates to the actions/* versions
#     used in .github/workflows/ci.yml.
#   - npm: weekly updates to the UI bundle versions and the
#     typescript pin. The /package.json at the repo root is a
#     *dev-only* manifest used by Dependabot to track upstream
#     versions. The Go source in ui/*/*.go is the source of truth
#     for the bundle version that ships. Every UI package has a
#     parity test comparing its pinned version constant against
#     package.json, so a Dependabot npm PR fails CI until a human:
#       1. Updates the version constant in the relevant ui/*/*.go
#       2. Re-fetches the bundle and updates the embedded copy
#          (*emb sub-packages; see the //go:generate directives)
#       3. Re-computes the SRI hashes and updates the integrity=
#          attributes (CDN sub-packages)
#       4. Updates the corresponding *_pinning_test.go expected
#          values
#     The typescript entry needs no Go-side step: CI re-checks the
#     tsgen corpus against the bumped compiler on the PR itself.
#
# OpenAPI spec versions: Dependabot cannot track the OAI spec
# releases directly. The OpenAPI Initiative publishes new
# versions on https://spec.openapis.org/oas/. Watch the releases
# page or subscribe to https://github.com/OAI/OpenAPI-Specification
# for new versions; bump internal/version/version.go manually
# when a release lands.

version: 2

updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/internal/spec/yaml/roundtrip_test"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-ui-bundles:
        patterns:
          - "*"
